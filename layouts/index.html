    const spinners = [
      {
						<!-- 🧍💑😏🌳🏋️🎥📖📺🎵🎮🥕🕋🎨📖🌐⭐-->

          { label: "💑 Casual",             color: "#be8359ff" },
        ],
        current: 0,
        offset: 0,
      },
      {
        el: document.querySelector("#spinner-2"),
        tags: [
          { label: "🏋️ Bouldering",         color: "#cc6672ff" },
          { label: "🎮 Settlers of Catan",         color: "#7995b7ff" },
          { label: "🎥 Cinema",             color: "#7995b7ff" },
          { label: "😏 Kink",         color: "#b594adff" },
          { label: "⭐ Singing",        color: "#7a97a7ff" },
          { label: "📖 Twilight",         color: "#7995b7ff" },
          { label: "🌳 Birdwatching",       color: "#829989ff" },
          { label: "🎥 The Owl House",      color: "#7995b7ff" },
          { label: "🎮 Dungeons & Dragons",     color: "#7995b7ff" },
          { label: "🌳 Mountain Biking",       color: "#829989ff" },
          { label: "⭐ Modern Dance",        color: "#7a97a7ff" },
          { label: "🎥 Kill Bill",            color: "#7995b7ff" },
          { label: "📖 Poetry",         color: "#7995b7ff" },
          { label: "⭐ Self Improvement",        color: "#7a97a7ff" },
          { label: "🏋️ Boxing",         color: "#cc6672ff" },
          { label: "😏 Kink",         color: "#b594adff" },
          { label: "🎮 GTA",     color: "#7995b7ff" },
          { label: "🏋️ Soccer",         color: "#cc6672ff" },
          { label: "🎮 Settlers of Catan",         color: "#7995b7ff" },
          { label: "📖 ACOTAR",         color: "#7995b7ff" },
          { label: "⭐ Keyboards",        color: "#7a97a7ff" },
          { label: "🌳 Stargazing",            color: "#829989ff" },
          { label: "🎮 Factorio",     color: "#7995b7ff" },
          { label: "🎥 Heated Rivalry",      color: "#7995b7ff" },
          { label: "⭐ DIY",        color: "#7a97a7ff" },
        ],
        current: 0,
        offset: 0, 
      },
    ];

    function buildItem(item) {
      const el = document.createElement("div");
      el.className = "tag-spinner-item";
      const tag = document.createElement("span");
      tag.className = "tag";
      tag.textContent = item.label;
      tag.style.backgroundColor = item.color;
      el.appendChild(tag);
      return el;
    }

    function initSpinner(spinner) {
      const first = buildItem(spinner.tags[0]);
      first.classList.add("visible");
      spinner.el.appendChild(first);
    }

    function rotateSpinner(spinner) {
      const next = (spinner.current + 1) % spinner.tags.length;

      const outgoing = spinner.el.querySelector(".tag-spinner-item.visible");
      if (outgoing) {
        outgoing.classList.remove("visible");
        outgoing.classList.add("exit");
        outgoing.addEventListener("animationend", () => outgoing.remove(), { once: true });
      }

      setTimeout(() => {
        const incoming = buildItem(spinner.tags[next]);
        incoming.classList.add("enter");
        spinner.el.appendChild(incoming);
        incoming.getBoundingClientRect();
        incoming.classList.remove("enter");
        incoming.classList.add("visible");
        spinner.current = next;
      }, 250);
    }

    spinners.forEach(spinner => {
      initSpinner(spinner);
      setTimeout(() => {
        setInterval(() => rotateSpinner(spinner), 2200);

      }, spinner.offset);
    });
  </script>
