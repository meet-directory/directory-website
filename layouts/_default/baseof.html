<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A basic dark-themed webpage template." />
  <title>Directory</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" type="image/png" href="/app_icon.png" />
</head>
<body>

  <header>
    <div class="container">
      <nav>
        <a href="/" class="nav-logo">
				<img src="/app_icon.png" alt="logo" height="44"> Directory</a>
		<button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
        <ul class="nav-links">
          <li><a href="/about">About</a></li>
          <li><a href="/blog">Blog</a></li>
          <li><a href="/donate">Support</a></li>
		  <li><a href="https://app.meet.directory" id="app-link"><span class="btn">Launch (beta)</span></a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
		  {{ block "main" . }}{{ end}}
  </main>

  <footer>
		  <div class="container">
				  <nav class="footer-links">
						  <span class="text-accent"><b>Legal</b></span>
						  <a href="/tos">Terms of Service</a>
						  <a href="/dpp">Privacy Policy</a>
				  </nav>
				  <p class="text-muted">&copy; 2026 Directory. All rights reserved.</p>
		  </div>
  </footer>

  <script>
	    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
		const appLink = document.getElementById('app-link');
		appLink.addEventListener('click', (e) => {
		  if (isSafari) {
			e.preventDefault(); // stop the redirect
			alert('This app is not yet supported in Safari-based browsers (including any broswer on iOS) :(. It will work in any other browser on Mac.');
		  }
		});
  </script>

  <script>
	    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
		const appLink = document.getElementById('app-link');
		appLink.addEventListener('click', (e) => {
		  if (isSafari) {
			e.preventDefault(); // stop the redirect
			alert('This app is not yet supported in Safari-based browsers (including any broswer on iOS) :(. It will work in any other browser on Mac.');
		  }
		});
  </script>

  <script>
  document.querySelector('.nav-toggle').addEventListener('click', () => {
    document.querySelector('.nav-links').classList.toggle('open');
  });
  </script>


</body>
</html>
